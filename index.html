<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>DuckUI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');
:root {
  --bg:#0d0e11; --surface:#13151a; --surface2:#1a1d24; --surface3:#22262f;
  --border:#2a2e38; --accent:#f5c842; --text:#e8eaf0; --muted:#6b7280;
  --danger:#f04f4f; --green:#4fce8a;
  --font:'Syne',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* TITLEBAR */
#titlebar{display:flex;align-items:center;gap:12px;padding:0 18px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#titlebar *{}
.logo{font-size:18px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:7px}
.logo span{color:var(--text)}
#status-pill{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface3);color:var(--muted);border:1px solid var(--border);transition:all .3s}
#status-pill.on{background:rgba(79,206,138,.12);color:var(--green);border-color:rgba(79,206,138,.3)}
.sp{flex:1}
.tb{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.tb:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ss{padding:12px 14px 5px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.si{display:flex;align-items:center;gap:9px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);border-left:2px solid transparent;transition:background .15s}
.si:hover{background:var(--surface2)}
.si.active{background:var(--surface2);border-left-color:var(--accent);color:var(--accent)}
#bm-list{flex:1;overflow-y:auto}
.bm{display:flex;align-items:center;gap:7px;padding:6px 14px;font-size:11px;cursor:pointer;color:var(--muted);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bm:hover{color:var(--text)}
.sidebar-bottom{padding:12px 14px;border-top:1px solid var(--border)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#path-bar{flex:1;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 11px;height:32px;gap:6px}
#path-bar span{color:var(--muted);font-size:12px}
#path-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12px}
.vbtn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s;font-weight:700}
.vbtn.active,.vbtn:hover{background:var(--surface3);color:var(--accent);border-color:var(--accent)}

/* BREADCRUMB */
#breadcrumb{display:flex;align-items:center;gap:3px;font-size:11px;font-family:var(--mono);color:var(--muted);padding:7px 14px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;white-space:nowrap}
.crumb{cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .12s}
.crumb:hover{color:var(--accent);background:rgba(245,200,66,.1)}
.csep{color:var(--border)}

/* FILE AREA */
#file-area{flex:1;overflow-y:auto;padding:16px}

/* ── GRID VIEW ── */
#fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:9px}
#fg.lv{grid-template-columns:1fr;gap:2px}

/* ── MEDIA VIEW (великі прев'ю) ── */
#fg.mv{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
}
/* 9x16 вертикальний режим */
#fg.mv9{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
}
#fg.mv9 .mc{aspect-ratio:9/16}
#fg.mv9 .mc-play{opacity:1}
#fg.mv9 .mc-video{opacity:1}
#fg.mv9 .mc-thumb img{transform:none!important}

/* Звичайна картка */
.fc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 9px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;text-align:center}
.fc:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-1px)}
.fc.li{flex-direction:row;padding:7px 11px;text-align:left;gap:11px;border-radius:7px;transform:none!important}
.fi{width:50px;height:50px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.fc.li .fi{width:28px;height:28px;font-size:15px;border-radius:5px}
.ft{width:50px;height:50px;border-radius:8px;object-fit:cover;background:var(--surface3);flex-shrink:0}
.fc.li .ft{width:28px;height:28px;border-radius:5px}
.fn{font-size:11px;font-weight:600;color:var(--text);word-break:break-all;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;max-width:100%}
.fc.li .fn{font-size:13px;flex:1;white-space:nowrap;-webkit-line-clamp:1}
.fsz{font-family:var(--mono);font-size:10px;color:var(--muted)}
.fc.li .fsz{font-size:11px;min-width:65px;text-align:right}
.cmb{position:absolute;top:4px;right:4px;background:none;border:none;color:var(--muted);cursor:pointer;opacity:0;font-size:13px;padding:2px 5px;border-radius:4px;transition:opacity .15s}
.fc:hover .cmb{opacity:1}
.cmb:hover{background:var(--surface3);color:var(--text)!important}

/* ── МЕДІА КАРТКА ── */
.mc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:all .2s;
  aspect-ratio:16/10;
  display:flex;
  flex-direction:column;
}
.mc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.5)}

/* Прев'ю обгортка */
.mc-thumb{
  position:relative;
  flex:1;
  overflow:hidden;
  background:var(--surface3);
  display:flex;
  align-items:center;
  justify-content:center;
}
.mc-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.mc:hover .mc-thumb img{transform:scale(1.04)}

/* Відео прев'ю — завжди видиме після завантаження */
.mc-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}
.mc-video.loaded{opacity:1}
.mc:hover .mc-video{opacity:1}

/* Іконка типу файлу */
.mc-type{
  position:absolute;top:8px;left:8px;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px);
  border-radius:6px;
  padding:3px 8px;
  font-size:10px;
  font-weight:700;
  font-family:var(--mono);
  color:#fff;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.mc-type.video{background:rgba(245,200,66,.85);color:#000}
.mc-type.image{background:rgba(79,206,138,.8);color:#000}
.mc-type.audio{background:rgba(139,92,246,.85);color:#fff}

/* Play кнопка для відео — завжди видима */
.mc-play{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:1;
  transition:opacity .2s;
  pointer-events:none;
}
.mc-play-btn{
  width:48px;height:48px;
  background:rgba(245,200,66,.9);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  transition:transform .15s;
}
.mc:hover .mc-play-btn{transform:scale(1.1)}

/* Велика іконка для файлів без прев'ю */
.mc-icon{font-size:40px;transition:opacity .3s}
#fg.mv9 .mc-thumb img, #fg.mv9 .mc-thumb video{transition:opacity .4s}

/* Нижня частина картки */
.mc-info{
  padding:9px 12px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:8px;
}
.mc-name{font-size:12px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-sz{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.mc .cmb{top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;opacity:0;border-radius:6px}
.mc:hover .cmb{opacity:1}

/* EMPTY */
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:11px;color:var(--muted)}
#empty .big{font-size:48px}
#empty h3{font-size:17px;font-weight:700;color:var(--text)}
#empty p{font-size:13px;text-align:center;line-height:1.6;max-width:300px}
#empty button{margin-top:6px;padding:9px 22px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* CTX */
#ctx{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:5px;z-index:9999;min-width:155px;box-shadow:0 8px 30px rgba(0,0,0,.6);display:none}
.ci{display:flex;align-items:center;gap:7px;padding:6px 9px;font-size:13px;cursor:pointer;border-radius:5px;color:var(--text);transition:background .12s}
.ci:hover{background:var(--surface3)}
.ci.d{color:var(--danger)}
.csep2{height:1px;background:var(--border);margin:3px 0}

/* PREVIEW */
#pv{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#pv.open{display:flex}
#pvbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;padding:13px 18px;gap:11px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent)}
#pvtitle{font-size:13px;font-weight:600;color:#fff;flex:1;font-family:var(--mono)}
#pvdl{padding:5px 13px;background:var(--accent);color:#000;border:none;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
#pvclose{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:19px;cursor:pointer;width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center}
#pvcontent{max-width:92vw;max-height:85vh;display:flex;align-items:center;justify-content:center}
#pvcontent img{max-width:92vw;max-height:85vh;object-fit:contain;border-radius:8px}
#pvcontent video{max-width:92vw;max-height:85vh;border-radius:8px;min-width:480px}
#pvcontent audio{width:380px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:26px;width:430px;max-width:95vw;box-shadow:0 22px 70px rgba(0,0,0,.7)}
.modal h2{font-size:19px;font-weight:800;margin-bottom:18px}
.fr{margin-bottom:13px}
.fr label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.fr input,.fr select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s}
.fr input:focus,.fr select:focus{border-color:var(--accent)}
.frs{display:flex;gap:9px}.frs .fr{flex:1}
.ma{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.bp{padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:7px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer}
.bp:hover{opacity:.85}
.bs{padding:8px 20px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:14px;cursor:pointer}
.bs:hover{color:var(--text);border-color:var(--text)}
.ptabs{display:flex;gap:5px;margin-bottom:18px}
.ptab{flex:1;padding:9px 5px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.ptab:hover{border-color:var(--accent);color:var(--accent)}
.ptab.active{background:rgba(245,200,66,.12);border-color:var(--accent);color:var(--accent)}
.ptab .pi{display:block;font-size:19px;margin-bottom:3px}
.hint{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}

/* TOAST */
#toast{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.t{padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text);box-shadow:0 4px 18px rgba(0,0,0,.5);animation:tsi .25s ease;max-width:280px}
.t.ok{border-color:var(--green);color:var(--green)}
.t.err{border-color:var(--danger);color:var(--danger)}
@keyframes tsi{from{transform:translateX(35px);opacity:0}to{transform:translateX(0);opacity:1}}

/* TRANSFER */
#xfer{background:var(--surface);border-top:1px solid var(--border);max-height:120px;overflow-y:auto;flex-shrink:0;display:none}
#xfer.on{display:block}
.xh{padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
.xi{display:flex;align-items:center;gap:9px;padding:6px 14px;font-size:12px}
.xi .xn{flex:1;font-family:var(--mono);color:var(--text)}
.xi .xs{font-size:11px;color:var(--muted)}
.xi .xs.ok{color:var(--green)}
.xi .xs.err{color:var(--danger)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.dz.dg{outline:2px dashed var(--accent);outline-offset:-4px;background:rgba(245,200,66,.04)}

</style>
</head>
<body>

<div id="titlebar">
  <div class="logo">🦆 <span>Duck</span>UI</div>
  <div id="status-pill">Не підключено</div>
  <div class="sp"></div>
  <button class="tb" onclick="openProxy()" title="Налаштування proxy">⚙</button>
  <button class="tb" onclick="openConn()">＋ Підключитись</button>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="ss">Навігація</div>
    <div class="si active" onclick="navigateTo('/')"><span>🏠</span> Корінь</div>
    <div class="si" onclick="loadDir(cwd)"><span>🔄</span> Оновити</div>
    <div class="ss" style="margin-top:8px">Закладки</div>
    <div id="bm-list"></div>
    <div class="sidebar-bottom">
      <div class="si" onclick="addBm()" style="padding:7px 0"><span>🔖</span> Закладка</div>
      <div class="si" onclick="doDisconnect()" style="padding:7px 0;color:var(--danger)"><span>⏏</span> Відключитись</div>
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <button class="tb" onclick="navigateTo(parentPath())">← Назад</button>
      <div id="path-bar"><span>📁</span><input id="path-input" placeholder="/" value="/" onkeydown="if(event.key==='Enter')navigateTo(this.value)"></div>
      <div style="display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 10px;height:32px;gap:6px;transition:border-color .15s" onfocusin="this.style.borderColor='var(--accent)'" onfocusout="this.style.borderColor='var(--border)'">
        <span style="color:var(--muted);font-size:13px">🔍</span>
        <input id="duck-search" placeholder="Пошук файлів…" style="background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12px;width:160px" oninput="duckSearch(this.value)">
        <button id="duck-search-clear" onclick="duckSearchClear()" style="display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px">✕</button>
      </div>
      <button class="tb" onclick="document.getElementById('upi').click()">⬆ Файли</button>
      <button class="tb" onclick="document.getElementById('upifolder').click()">📁 Папку</button>
      <button class="tb" onclick="openMkdir()">📂 Нова папка</button>
      <div style="display:flex;gap:3px;border:1px solid var(--border);border-radius:8px;padding:3px;background:var(--surface2)">
        <button class="vbtn" id="vg" onclick="setView('g')" title="Сітка">⊞</button>
        <button class="vbtn active" id="vm" onclick="setView('m')" title="Медіа 16:10">▣</button>
        <button class="vbtn" id="vm9" onclick="setView('m9')" title="Медіа 9:16 вертикально">▯</button>
        <button class="vbtn" id="vl" onclick="setView('l')" title="Список">≡</button>
      </div>
      <div style="display:flex;gap:3px;border:1px solid var(--border);border-radius:8px;padding:3px;background:var(--surface2)">
        <button class="vbtn active" id="sort-name" onclick="setSort('name')" title="За іменем">АЯ</button>
        <button class="vbtn" id="sort-date" onclick="setSort('date')" title="За датою">📅</button>
        <button class="vbtn" id="sort-dir" onclick="toggleSortDir()" title="Напрямок" id="sort-dir-btn">↑</button>
      </div>
      <input type="file" id="upi" multiple style="display:none" onchange="uploadFiles(this.files)">
      <input type="file" id="upifolder" multiple webkitdirectory style="display:none" onchange="uploadFolder(this.files)">
    </div>
    <div id="breadcrumb"></div>
    <div id="file-area" class="dz"><div id="fg" class="mv"></div></div>
    <div id="xfer"><div class="xh">Передачі</div><div id="xlist"></div></div>
  </div>
</div>

<div id="ctx">
  <div class="ci" onclick="ctxPv()"><span>👁</span> Переглянути</div>
  <div class="ci" onclick="ctxDl()"><span>⬇</span> Завантажити</div>
  <div class="ci" onclick="ctxShare()"><span>🔗</span> Скопіювати посилання</div>
  <div class="csep2"></div>
  <div class="ci" onclick="ctxRn()"><span>✏</span> Перейменувати</div>
  <div class="ci d" onclick="ctxDel()"><span>🗑</span> Видалити</div>
</div>

<div id="pv">
  <div id="pvbar">
    <div id="pvtitle"></div>
    <button id="pvshare" onclick="pvShare()" style="padding:5px 13px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer">🔗 Поділитись</button>
    <button id="pvdl" onclick="pvSave()">⬇ Зберегти</button>
    <button id="pvclose" onclick="closePv()">✕</button>
  </div>
  <div id="pvcontent"></div>
</div>

<div id="mc"></div>
<div id="toast"></div>

<script>
let cwd='/'; let entries=[]; let displayEntries=[]; let view='m'; let ctx=null; let pvFile=null;
let sortBy='name'; let sortAsc=true;
const thumbMemCache={}; // in-memory кеш прев'ю папок
let bms=JSON.parse(localStorage.getItem('duckui_bm')||'[]');
let proto='b2';
let b2={auth:null,apiUrl:'',downloadUrl:'',accountId:'',keyId:'',appKey:'',bucket:'',bucketId:''};
// url cache: key -> blobUrl
const urlCache = {};

document.addEventListener('DOMContentLoaded',()=>{renderBms();renderEmpty('disco');setupDrop();});
document.addEventListener('click',()=>document.getElementById('ctx').style.display='none');
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePv();closeMc();}});

// ── B2 API ────────────────────────────────────────────────────────────────
// CORS proxy for browser (set your Cloudflare Worker URL here)
// Leave empty to try direct (works in Electron, may fail in browser)
const PROXY = localStorage.getItem('duckui_proxy') || '';

function proxyUrl(url) {
  const p = localStorage.getItem('duckui_proxy') || '';
  if (!p) return url;
  return p.replace(/\/$/, '') + '/?url=' + encodeURIComponent(url);
}

async function b2Auth(ki,ak){
  const url = proxyUrl('https://api.backblazeb2.com/b2api/v3/b2_authorize_account');
  const r=await fetch(url,{headers:{Authorization:'Basic '+btoa(ki+':'+ak)}});
  if(!r.ok){const e=await r.json();throw new Error(e.message||'Auth failed');}
  return r.json();
}
async function b2Call(ep, body=null){
  const targetUrl = b2.apiUrl + '/b2api/v3/' + ep;
  const url = proxyUrl(targetUrl);
  const opts={method:body?'POST':'GET',headers:{Authorization:b2.auth.authorizationToken,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(!r.ok){const e=await r.json();throw new Error(e.message||ep+' failed');}
  return r.json();
}
async function b2GetDownloadUrl(key){
  if(urlCache[key])return urlCache[key];
  const r=await b2Call('b2_get_download_authorization',{bucketId:b2.bucketId,fileNamePrefix:key,validDurationInSeconds:7200});
  const rawUrl=b2.downloadUrl+'/file/'+b2.bucket+'/'+encodeURIComponent(key)+'?Authorization='+r.authorizationToken;
  const url = proxyUrl(rawUrl);
  urlCache[key]=url;
  return url;
}
// Прямий URL без proxy — для відео (video елемент може завантажувати напряму)
async function b2GetDirectUrl(key){
  const r=await b2Call('b2_get_download_authorization',{bucketId:b2.bucketId,fileNamePrefix:key,validDurationInSeconds:7200});
  return b2.downloadUrl+'/file/'+b2.bucket+'/'+encodeURIComponent(key)+'?Authorization='+r.authorizationToken;
}
async function b2Ls(prefix){
  prefix=prefix.replace(/^\//,'');
  if(prefix&&!prefix.endsWith('/'))prefix+='/';
  const d=await b2Call('b2_list_file_names',{bucketId:b2.bucketId,prefix,delimiter:'/',maxFileCount:1000});
  const out=[]; const seen=new Set();
  for(const f of d.files||[]){
    if(f.action==='folder'){
      const name=f.fileName.replace(prefix,'').replace(/\/$/,'');
      // Приховуємо системну папку .thumbs
      if(name&&!seen.has(name)&&name!=='.thumbs'){seen.add(name);out.push({name,type:'dir',size:0,modified:null,_key:f.fileName});}
    } else {
      const name=f.fileName.replace(prefix,'');
      if(name&&!name.includes('/'))out.push({name,type:'file',size:f.contentLength,modified:f.uploadTimestamp/1000,_key:f.fileName,_id:f.fileId});
    }
  }
  out.sort((a,b)=>(a.type==='dir'?0:1)-(b.type==='dir'?0:1)||a.name.localeCompare(b.name));
  return out;
}
async function b2Upload(key,data,mime){
  const ud=await b2Call('b2_get_upload_url',{bucketId:b2.bucketId});
  const uploadUrl=proxyUrl(ud.uploadUrl);
  const r=await fetch(uploadUrl,{method:'POST',headers:{Authorization:ud.authorizationToken,'X-Bz-File-Name':encodeURIComponent(key),'Content-Type':mime||'application/octet-stream','Content-Length':data.byteLength,'X-Bz-Content-Sha1':'do_not_verify'},body:data});
  if(!r.ok){const e=await r.json();throw new Error(e.message);}
  return r.json();
}

      const downloadUrl=auth.apiInfo?.storageApi?.downloadUrl||auth.downloadUrl;
      const bd=await fetch(proxyUrl(apiUrl+'/b2api/v3/b2_list_buckets'),{method:'POST',headers:{Authorization:auth.authorizationToken,'Content-Type':'application/json'},body:JSON.stringify({accountId:auth.accountId,bucketName:s.bucket})});

async function doConn(save=false){
  const btn=document.getElementById('bcn');
  const saveBtn=btn.previousElementSibling;
  if(save&&saveBtn){saveBtn.textContent='⏳…';saveBtn.disabled=true;}
  else{btn.textContent='Підключення…';btn.disabled=true;}
  try{
    const ki=document.getElementById('b2ki').value.trim(),ak=document.getElementById('b2ak').value.trim(),bk=document.getElementById('b2bk').value.trim();
    const nm=document.getElementById('b2nm')?.value.trim()||bk;
    if(!ki||!ak||!bk){showToast('Заповни всі поля','err');return;}
    const auth=await b2Auth(ki,ak);
    const apiUrl=auth.apiInfo?.storageApi?.apiUrl||auth.apiUrl;
    const downloadUrl=auth.apiInfo?.storageApi?.downloadUrl||auth.downloadUrl;
    const bd=await fetch(proxyUrl(apiUrl+'/b2api/v3/b2_list_buckets'),{method:'POST',headers:{Authorization:auth.authorizationToken,'Content-Type':'application/json'},body:JSON.stringify({accountId:auth.accountId,bucketName:bk})});
    const blist=await bd.json();
    const bucket=(blist.buckets||[]).find(x=>x.bucketName===bk);
    if(!bucket){showToast(`Бакет "${bk}" не знайдено`,'err');return;}
    b2={auth,apiUrl,downloadUrl,accountId:auth.accountId,keyId:ki,appKey:ak,bucket:bk,bucketId:bucket.bucketId};
    if(save){
      const list=await loadSaved();
      const existing=list.findIndex(x=>x.keyId===ki&&x.bucket===bk);
      const entry={name:nm,proto:'b2',keyId:ki,appKey:ak,bucket:bk};
      if(existing>=0)list[existing]=entry; else list.push(entry);
      await persistSaved(list);
      showToast('Збережено: '+nm,'ok');
    }
    setConnected(true,'B2',bk,ki.slice(0,10)+'…');
    cwd='/';closeMc();showToast('Підключено до '+bk+' 🎉','ok');
    loadDir('/');
  }catch(e){showToast('Помилка: '+e.message,'err');}
  if(save&&saveBtn){saveBtn.textContent='💾 Зберегти і підключитись';saveBtn.disabled=false;}
  else{btn.textContent='Підключитись';btn.disabled=false;}
}

// Асинхронно завантажує прев'ю першого медіафайлу в папці
// Черга для прев'ю папок — максимум 4 паралельно
const thumbQueue={running:0,max:2,queue:[]};
function queueThumb(fn){
  thumbQueue.queue.push(fn);
  runThumbQueue();
}
function runThumbQueue(){
  while(thumbQueue.running<thumbQueue.max&&thumbQueue.queue.length){
    const fn=thumbQueue.queue.shift();
    thumbQueue.running++;
    fn().finally(()=>{
      thumbQueue.running--;
      setTimeout(runThumbQueue,200); // пауза між запитами
    });
  }
}

// Конвертує data URL в Blob
function dataURLtoBlob(dataURL){
  const arr=dataURL.split(',');
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);
  const u8=new Uint8Array(bstr.length);
  for(let i=0;i<bstr.length;i++) u8[i]=bstr.charCodeAt(i);
  return new Blob([u8],{type:mime});
}

// Генерує thumbnail і зберігає в B2 + localStorage
async function generateAndSaveThumb(folderKey, srcDataUrl){
  const thumbKey='.thumbs/'+folderKey.replace(/\//g,'_').replace(/^_|_$/g,'')+'.jpg';
  try{
    const blob=dataURLtoBlob(srcDataUrl);
    const buf=await blob.arrayBuffer();
    await b2Upload(thumbKey, buf, 'image/jpeg');
  }catch{}
  // Також зберігаємо локально
  try{localStorage.setItem('thumb_'+b2.bucket+'_'+folderKey, srcDataUrl);}catch{}
}

async function loadFolderThumb(thumbId, folderKey){
  const ph=()=>document.getElementById(thumbId);
  if(!ph())return;

  const cacheKey='thumb_'+b2.bucket+'_'+folderKey;
  const thumbB2Key='.thumbs/'+folderKey.replace(/\//g,'_').replace(/^_|_$/g,'')+'.jpg';

  // 1. Перевіряємо localStorage
  const cached=localStorage.getItem(cacheKey);
  if(cached){
    const e=ph();if(!e)return;
    const img=document.createElement('img');
    img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:opacity .15s;opacity:0';
    img.onload=()=>img.style.opacity='1';
    img.src=cached;
    e.parentNode.insertBefore(img,e);e.remove();
    return;
  }

  // 2. Перевіряємо B2 .thumbs/ — спочатку чи файл існує
  try{
    const check=await b2Call('b2_list_file_names',{bucketId:b2.bucketId,prefix:thumbB2Key,maxFileCount:1});
    const exists=(check.files||[]).some(f=>f.fileName===thumbB2Key);
    if(exists){
      const thumbUrl=await b2GetDownloadUrl(thumbB2Key);
      const e=ph();if(!e)return;
      const img=document.createElement('img');
      img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:opacity .15s;opacity:0';
      img.onload=async()=>{
        img.style.opacity='1';
        thumbMemCache[cacheKey]=thumbUrl;
        try{
          const c=document.createElement('canvas');
          c.width=180;c.height=320;
          const s=Math.max(180/img.naturalWidth,320/img.naturalHeight);
          c.getContext('2d').drawImage(img,(180-img.naturalWidth*s)/2,(320-img.naturalHeight*s)/2,img.naturalWidth*s,img.naturalHeight*s);
          localStorage.setItem(cacheKey,c.toDataURL('image/jpeg',0.5));
        }catch{}
      };
      img.onerror=()=>{img.remove();loadFolderThumbGenerate(thumbId,folderKey,thumbB2Key,cacheKey);};
      img.src=thumbUrl;
      e.parentNode.insertBefore(img,e);e.remove();
      return;
    }
  }catch{}

  // 3. Генеруємо новий thumbnail
  await loadFolderThumbGenerate(thumbId,folderKey,thumbB2Key,cacheKey);
}

async function loadFolderThumbGenerate(thumbId,folderKey,thumbB2Key,cacheKey){
  const ph=()=>document.getElementById(thumbId);
  if(!ph())return;
  try{
    const d=await b2Call('b2_list_file_names',{
      bucketId:b2.bucketId,prefix:folderKey,delimiter:'/',maxFileCount:100
    });
    const imgFile=(d.files||[]).find(f=>isImage(f.fileName));
    const vidFile=(d.files||[]).find(f=>isVideo(f.fileName));

    const showThumb=(src)=>{
      // Зберігаємо тільки якщо це валідний data URL
      if(!src||!src.startsWith('data:image')){return;}
      // Зберігаємо в in-memory кеш
      thumbMemCache[cacheKey]=src;
      const e=ph();if(!e)return;
      const img=document.createElement('img');
      img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:opacity .2s;opacity:0';
      img.onload=()=>img.style.opacity='1';
      img.src=src;
      e.parentNode.insertBefore(img,e);e.remove();
      // Зберігаємо в B2 і localStorage у фоні
      generateAndSaveThumb(folderKey,src);
    };

    if(imgFile){
      const url=await b2GetDownloadUrl(imgFile.fileName);
      if(!ph())return;
      await new Promise(resolve=>{
        const tmp=document.createElement('img');
        tmp.crossOrigin='anonymous';
        tmp.style.cssText='position:fixed;left:-9999px';
        document.body.appendChild(tmp);
        tmp.onload=async()=>{
          try{
            const W=180,H=320;
            let src;
            if(typeof OffscreenCanvas!=='undefined'){
              const oc=new OffscreenCanvas(W,H);
              const bmp=await createImageBitmap(tmp,{resizeWidth:W,resizeHeight:H,resizeQuality:'low'});
              oc.getContext('2d').drawImage(bmp,0,0);
              const blob=await oc.convertToBlob({type:'image/jpeg',quality:0.5});
              src=await new Promise(r=>{const fr=new FileReader();fr.onload=ev=>r(ev.target.result);fr.readAsDataURL(blob);});
            } else {
              const cv=document.createElement('canvas');
              cv.width=W;cv.height=H;
              const s=Math.max(W/tmp.naturalWidth,H/tmp.naturalHeight);
              cv.getContext('2d').drawImage(tmp,(W-tmp.naturalWidth*s)/2,(H-tmp.naturalHeight*s)/2,tmp.naturalWidth*s,tmp.naturalHeight*s);
              src=cv.toDataURL('image/jpeg',0.5);
            }
            document.body.removeChild(tmp);
            showThumb(src);
          }catch{document.body.removeChild(tmp);}
          resolve();
        };
        tmp.onerror=()=>{document.body.removeChild(tmp);resolve();};
        tmp.src=url;
      });

    } else if(vidFile){
      // Відео — використовуємо прямий URL без proxy (video елемент підтримує CORS)
      const url=await b2GetDirectUrl(vidFile.fileName);
      if(!ph())return;
      await new Promise(resolve=>{
        const vid=document.createElement('video');
        vid.muted=true;vid.preload='auto';vid.playsInline=true;
        vid.style.cssText='position:fixed;left:-9999px;width:320px;height:180px;opacity:0';
        document.body.appendChild(vid);
        const cleanup=()=>{try{document.body.removeChild(vid);}catch{}};
        const grabFrame=()=>{
          try{
            if(vid.videoWidth===0||vid.videoHeight===0){cleanup();resolve();return;}
            const cv=document.createElement('canvas');
            cv.width=180;cv.height=320;
            const s=Math.max(180/vid.videoWidth,320/vid.videoHeight);
            cv.getContext('2d').drawImage(vid,(180-vid.videoWidth*s)/2,(320-vid.videoHeight*s)/2,vid.videoWidth*s,vid.videoHeight*s);
            const src=cv.toDataURL('image/jpeg',0.5);
            cleanup();
            showThumb(src);
          }catch(e){cleanup();}
          resolve();
        };
        vid.addEventListener('seeked',grabFrame);
        vid.addEventListener('loadeddata',()=>{vid.currentTime=0;});
        vid.addEventListener('canplay',()=>{if(vid.currentTime===0)vid.currentTime=0.001;});
        vid.addEventListener('error',()=>{cleanup();resolve();});
        vid.src=url;
        vid.load();
        setTimeout(()=>{if(vid.readyState>=2){grabFrame();}else{cleanup();resolve();}},6000);
      });
    }
  }catch{}
}

async function dlFolder(prefix, name){
  showToast('Збираємо файли папки…');
  try{
    const all = await b2LsAll(prefix);
    if(!all.length){ showToast('Папка порожня','err'); return; }
    showToast(`Завантажуємо ${all.length} файлів як ZIP…`);

    // Використовуємо fflate для zip прямо в браузері
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js';
    document.head.appendChild(script);
    await new Promise(res => script.onload = res);

    const zipData = {};
    const prefixStripped = prefix.endsWith('/') ? prefix : prefix+'/';

    for(const f of all){
      const relPath = f.name.replace(prefixStripped,'');
      const url = await b2GetDownloadUrl(f.name);
      const resp = await fetch(url);
      const buf = await resp.arrayBuffer();
      zipData[relPath] = new Uint8Array(buf);
      showToast(`${Object.keys(zipData).length}/${all.length} завантажено…`);
    }

    const zipped = fflate.zipSync(zipData);
    const blob = new Blob([zipped], {type:'application/zip'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name+'.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast(name+'.zip збережено ✓','ok');
  }catch(e){ showToast('Помилка: '+e.message,'err'); }
}

// Рекурсивно отримує всі файли в папці
async function b2LsAll(prefix){
  if(!prefix.endsWith('/')) prefix+='/';
  const all=[];
  let nextName=null;
  do {
    const body={bucketId:b2.bucketId,prefix,maxFileCount:1000};
    if(nextName) body.startFileName=nextName;
    const d=await b2Call('b2_list_file_names',body);
    for(const f of d.files||[]){
      if(f.action!=='folder') all.push({name:f.fileName,id:f.fileId});
    }
    nextName=d.nextFileName||null;
  } while(nextName);
  return all;
}

      const all=await b2LsAll(ctx._key2);
      if(!all.length){ showToast('Папка порожня — видалено','ok'); loadDir(cwd); return; }
      showToast(`Видаляємо ${all.length} файлів…`);
      // видаляємо по 10 паралельно
      for(let i=0;i<all.length;i+=10){
        const batch=all.slice(i,i+10);
        await Promise.all(batch.map(f=>b2Call('b2_delete_file_version',{fileName:f.name,fileId:f.id})));
      }
    } else {
      await b2Call('b2_delete_file_version',{fileName:ctx._key2,fileId:ctx._id});
    }

}

async function uploadFiles(files){
  for(const file of files){
    const prefix=cwd.replace(/^\//,'');
    const key=prefix?prefix+file.name:file.name;
    addXfer(file.name,'Відправка…');
    try{
      const buf=await file.arrayBuffer();
      await b2Upload(key,buf,file.type||'application/octet-stream');
      updXfer(file.name,'ok','✓ Відправлено');showToast(file.name+' відправлено','ok');
    }catch(e){updXfer(file.name,'err','✗ Помилка');showToast(e.message,'err');}
  }
  loadDir(cwd);
}

async function uploadFolder(files){
  const arr=[...files];
  if(!arr.length) return;
  showToast(`Завантаження ${arr.length} файлів… ⏳`);
  let ok=0, fail=0;
  for(const file of arr){
    const rel=file.webkitRelativePath||file.name;
    const base=cwd.replace(/^\//,'');
    const key=(base+rel).replace(/\/+/g,'/');
    addXfer(rel,'Відправка…');
    try{
      const buf=await file.arrayBuffer();
      await b2Upload(key,buf,file.type||'application/octet-stream');
      updXfer(rel,'ok','✓'); ok++;
    }catch(e){ updXfer(rel,'err','✗'); fail++; }
  }
  showToast(`Готово: ${ok} завантажено${fail?', '+fail+' помилок':''}`, fail?'':'ok');
  loadDir(cwd);
}

async function readEntry(entry,path=''){
  if(entry.isFile){
    return new Promise(res=>{
      entry.file(async file=>{
        const base=cwd.replace(/^\//,'');
        const key=(base+(path?path+'/':'')+file.name).replace(/\/+/g,'/');
        const label=(path?path+'/':'')+file.name;
        addXfer(label,'Відправка…');
        try{
          const buf=await file.arrayBuffer();
          await b2Upload(key,buf,file.type||'application/octet-stream');
          updXfer(label,'ok','✓ Відправлено');
        }catch(e){updXfer(label,'err','✗ Помилка');}
        res();
      });
    });
  } else if(entry.isDirectory){
    const reader=entry.createReader();
    await new Promise(res=>reader.readEntries(async entries=>{
      for(const e of entries) await readEntry(e,path+'/'+entry.name);
      res();
    }));
  }
}

async function dropItems(items){
  const entries=[...items].map(i=>i.webkitGetAsEntry?.()).filter(Boolean);
  if(!entries.length) return;
  if(entries.some(e=>e.isDirectory)) showToast('Завантаження папки… ⏳');
  for(const e of entries) await readEntry(e);
  showToast('Завантаження завершено ✓','ok');
  loadDir(cwd);
}

function setupDrop(){
  const z=document.getElementById('file-area');if(!z)return;
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dg');});
  z.addEventListener('dragleave',()=>z.classList.remove('dg'));
  z.addEventListener('drop',e=>{
    e.preventDefault();z.classList.remove('dg');
    if(e.dataTransfer.items?.length) dropItems(e.dataTransfer.items);
    else if(e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
  });
}

function addXfer(name,s){
  document.getElementById('xfer').classList.add('on');
  const id='x'+btoa(encodeURIComponent(name)).replace(/\W/g,'');
  document.getElementById('xlist').insertAdjacentHTML('afterbegin',`<div class="xi" id="${id}"><span class="xn">${name}</span><span class="xs">${s}</span></div>`);
}
function updXfer(name,cls,s){
  const id='x'+btoa(encodeURIComponent(name)).replace(/\W/g,'');
  const el=document.getElementById(id);
  if(el){el.querySelector('.xs').className='xs '+cls;el.querySelector('.xs').textContent=s;}
}

async function clearThumbs(){
  if(!b2.auth){showToast('Спочатку підключись','err');return;}
  if(!confirm('Видалити всі кешовані прев\'ю з B2 (.thumbs/)?\nВони будуть згенеровані знову при наступному відкритті.'))return;
  showToast('Очищення .thumbs/…');
  try{
    const all=await b2LsAll('.thumbs/');
    let count=0;
    for(const f of all){
      await b2Call('b2_delete_file_version',{fileName:f.name,fileId:f.id});
      count++;
    }
    // Очищаємо і localStorage кеш
    Object.keys(localStorage).filter(k=>k.startsWith('thumb_')).forEach(k=>localStorage.removeItem(k));
    Object.keys(thumbMemCache).forEach(k=>delete thumbMemCache[k]);
    showToast(`Очищено ${count} прев'ю ✓`,'ok');
    loadDir(cwd);
  }catch(e){showToast('Помилка: '+e.message,'err');}
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function isImage(n){return/\.(jpe?g|png|gif|webp|bmp|svg|ico|avif)$/i.test(n);}
function isVideo(n){return/\.(mp4|mkv|avi|mov|wmv|webm|m4v)$/i.test(n);}
function isAudio(n){return/\.(mp3|flac|wav|m4a|aac|ogg)$/i.test(n);}
function isPreviewable(n){return isImage(n)||isVideo(n)||isAudio(n);}
function ficon(name,isDir){
  if(isDir)return'📁';if(isImage(name))return'🖼';if(isVideo(name))return'🎬';
  if(isAudio(name))return'🎵';if(/\.pdf$/i.test(name))return'📄';
  if(/\.(zip|rar|7z|tar|gz)$/i.test(name))return'📦';
  if(/\.(js|ts|py|php|go|html|css|json|sh|sql)$/i.test(name))return'💾';
  return'📃';
}
function fmtSz(b){
  if(!b)return'—';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';
  if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';
}
function showToast(msg,type=''){
  const c=document.getElementById('toast');
  const t=document.createElement('div');t.className='t '+type;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3500);
}

function saveProxy(){
  const v=document.getElementById('proxy-url').value.trim();
  localStorage.setItem('duckui_proxy',v);
  // Update PROXY var
  window.PROXY_URL=v;
  closeMc();
  showToast(v?'Proxy збережено ✓':'Proxy видалено','ok');
}

function closeMc(){document.getElementById('mc').innerHTML='';}

// ── QUICK SPACES ──────────────────────────────────────────────────────────
let duckSearchQuery = '';
function duckSearch(q) {
  duckSearchQuery = q.toLowerCase().trim();
  const clear = document.getElementById('duck-search-clear');
  if (clear) clear.style.display = duckSearchQuery ? 'block' : 'none';
  const filtered = duckSearchQuery
    ? entries.filter(e => e.name.toLowerCase().includes(duckSearchQuery))
    : entries;
  renderFiles(filtered);
  // Show count hint
  if (duckSearchQuery && filtered.length !== entries.length) {
    showToast(`Знайдено: ${filtered.length} з ${entries.length}`, '');
  }
}
function duckSearchClear() {
  document.getElementById('duck-search').value = '';
  duckSearch('');
}
